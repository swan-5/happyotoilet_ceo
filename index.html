<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HappyToilet 🚽</title>
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #e8f4fd;
      --bg2: #d0eaf9;
      --primary: #1a7fc4;
      --primary-light: #3aa0e8;
      --primary-dark: #0d5a8e;
      --accent: #00c9b1;
      --accent2: #f7c948;
      --text: #0d2d44;
      --text-muted: #5a8aaa;
      --card: #ffffff;
      --border: #b3d8f0;
      --shadow: 0 4px 24px rgba(26,127,196,0.10);
      --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 16px rgba(26,127,196,0.25);
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.5rem;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      letter-spacing: -0.5px;
    }
    .logo span { font-size: 1.6rem; }
    nav .nav-btns { display: flex; gap: 0.75rem; }
    .btn {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      border: none;
      cursor: pointer;
      border-radius: 50px;
      padding: 0.5rem 1.25rem;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .btn-outline { background: transparent; border: 2px solid rgba(255,255,255,0.7); color: #fff; }
    .btn-outline:hover { background: rgba(255,255,255,0.15); }
    .btn-white { background: #fff; color: var(--primary); }
    .btn-white:hover { background: #e0f0ff; }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 55%, #4db8f0 100%);
      padding: 4rem 2rem 5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      animation: float 6s ease-in-out infinite;
    }
    .bubble:nth-child(1) { width: 80px; height: 80px; left: 8%; top: 20%; }
    .bubble:nth-child(2) { width: 50px; height: 50px; left: 20%; top: 60%; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-18px); } }
    
    .hero h1 { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: clamp(2rem, 5vw, 3.2rem); color: #fff; position: relative; line-height: 1.2; }
    .hero p { color: rgba(255,255,255,0.85); margin: 1rem auto 2rem; max-width: 540px; font-size: 1.05rem; line-height: 1.6; position: relative; }
    .hero-cta { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; position: relative; }

    /* STATS */
    .stats-bar { background: var(--card); display: flex; justify-content: center; box-shadow: var(--shadow); border-bottom: 1px solid var(--border); overflow-x: auto; }
    .stat-item { padding: 1.2rem 2.5rem; text-align: center; border-right: 1px solid var(--border); flex: 1; min-width: 120px; }
    .stat-num { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.6rem; color: var(--primary); }
    .stat-label { font-size: 0.78rem; color: var(--text-muted); }

    /* SEARCH */
    .search-section { max-width: 720px; margin: 2.5rem auto 0; padding: 0 1.5rem; }
    .search-box { display: flex; background: var(--card); border: 2px solid var(--border); border-radius: 50px; overflow: hidden; box-shadow: var(--shadow); }
    .search-box input { flex: 1; border: none; outline: none; padding: 0.85rem 1.5rem; font-size: 0.95rem; }
    .search-box button { background: var(--primary); color: #fff; border: none; padding: 0 1.5rem; cursor: pointer; }
    .tag { background: var(--bg2); color: var(--primary-dark); border-radius: 50px; padding: 0.3rem 0.85rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; margin-right: 5px; border: 1px solid var(--border); }
    .tag.active { background: var(--primary); color: #fff; }

    /* MAIN LAYOUT */
    .main-wrap { max-width: 1100px; margin: 2.5rem auto; padding: 0 1.5rem; display: grid; grid-template-columns: 1fr 300px; gap: 2rem; }
    @media (max-width: 768px) { .main-wrap { grid-template-columns: 1fr; } }

    /* REVIEW CARDS */
    .review-card { background: var(--card); border-radius: var(--radius); padding: 1.4rem 1.5rem; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 1.25rem; animation: slideUp 0.3s ease both; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .review-place { font-family: 'Nunito', sans-serif; font-weight: 900; color: var(--primary-dark); }
    .stars { color: var(--accent2); margin: 5px 0; }
    .badge { background: var(--bg2); color: var(--primary); border-radius: 6px; padding: 0.2rem 0.55rem; font-size: 0.72rem; margin-right: 4px; }
    .badge.green { background: #e0f9f5; color: #00917a; }

    /* SIDEBAR */
    .side-card { background: var(--card); border-radius: var(--radius); padding: 1.3rem; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 1.25rem; }
    .side-card-title { font-weight: 900; margin-bottom: 0.9rem; }
    .top-place { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.5rem; border-bottom: 1px solid var(--border); }
    .top-place:last-child { border-bottom: none; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,40,70,0.5); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: flex-start; padding: 2rem 1rem; overflow-y: auto; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--card); border-radius: 24px; padding: 2rem; width: 100%; max-width: 520px; margin: auto; }
    .form-group { margin-bottom: 1rem; }
    .form-input { width: 100%; border: 2px solid var(--border); border-radius: 10px; padding: 0.7rem 1rem; margin-top: 5px; background: var(--bg); }
    .star-btn { font-size: 1.6rem; cursor: pointer; filter: grayscale(1); background: none; border: none; }
    .star-btn.active { filter: grayscale(0); transform: scale(1.1); }
    .form-submit { width: 100%; background: var(--primary); color: #fff; border: none; border-radius: 50px; padding: 0.9rem; font-weight: 900; cursor: pointer; }

    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--primary-dark); color: #fff; padding: 0.8rem 1.8rem; border-radius: 50px; font-weight: 700; z-index: 2000; transition: transform 0.3s; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    footer { background: var(--primary-dark); color: rgba(255,255,255,0.7); text-align: center; padding: 2rem; }
  </style>
</head>
<body>

<nav>
  <div class="logo"><span>🚽</span> HappyToilet</div>
  <div class="nav-btns">
    <button class="btn btn-outline" onclick="openModal()">✏️ 리뷰 작성</button>
  </div>
</nav>

<section class="hero">
  <div class="bubble"></div><div class="bubble"></div>
  <h1>🚽 당신의 화장실을<br>세상에 공유해보세요🚽</h1>
  <p>안녕? 나 변기걸즈예요<br>지금 당신의 화장실을 리뷰하라!!</p>
  <div class="hero-cta">
    <button class="btn-hero" style="background:var(--accent2); color:var(--text); padding:0.8rem 2rem; border-radius:50px; font-weight:700; border:none; cursor:pointer;" onclick="openModal()">✍️ 리뷰 작성하기</button>
  </div>
</section>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-num" id="stat-reviews">0</div><div class="stat-label">📝 총 리뷰</div></div>
  <div class="stat-item"><div class="stat-num" id="stat-places">0</div><div class="stat-label">📍 등록된 장소</div></div>
  <div class="stat-item"><div class="stat-num">4.2⭐</div><div class="stat-label">평균 평점</div></div>
</div>

<div class="search-section">
  <div class="search-box">
    <input type="text" id="search-input" placeholder="장소명 검색..." />
    <button onclick="doSearch()">🔍</button>
  </div>
  <div class="search-tags" style="margin-top:0.75rem;">
    <span class="tag active" onclick="filterCategory('전체', this)">전체</span>
    <span class="tag" onclick="filterCategory('카페', this)">☕ 카페</span>
    <span class="tag" onclick="filterCategory('쇼핑몰', this)">🛍️ 쇼핑몰</span>
    <span class="tag" onclick="filterTag('청결', this)">✨ 청결</span>
  </div>
</div>

<div class="main-wrap">
  <div>
    <div style="font-weight:900; font-size:1.3rem; margin-bottom:1rem;">최근 리뷰 <span id="review-count" style="background:var(--primary); color:#fff; padding:2px 8px; border-radius:50px; font-size:0.8rem;">0</span></div>
    <div id="reviews-container"></div>
  </div>

  <aside class="sidebar">
    <div class="side-card" style="background:linear-gradient(135deg, var(--primary), var(--accent)); color:#fff;">
      <p style="font-size:0.9rem; margin-bottom:0.8rem;">✨ 당신의 솔직한 리뷰가<br>다른 사람에게 큰 도움이 돼요!</p>
      <button onclick="openModal()" style="background:#fff; color:var(--primary-dark); border:none; padding:0.6rem; width:100%; border-radius:50px; font-weight:900; cursor:pointer;">🚽 리뷰 작성하기</button>
    </div>
    <div class="side-card">
      <div class="side-card-title">🏆 추천 화장실</div>
      <div id="top-places"></div>
    </div>
  </aside>
</div>

<footer>
  <div style="font-weight:900; font-size:1.2rem; margin-bottom:0.5rem;">🚽 HappyToilet</div>
  <p>© 2026 Happytoilet_ceo · 전국 화장실을 리뷰하는 그 날까지</p>
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem;">
      <h2 style="font-weight:900;">🚽 화장실 리뷰 작성</h2>
      <button onclick="closeModal()" style="background:none; border:none; font-size:1.2rem; cursor:pointer;">✕</button>
    </div>
    <div class="form-group">
      <label style="font-weight:700; font-size:0.85rem;">📍 장소 이름</label>
      <input class="form-input" id="place-name" placeholder="예: 중앙대 310관 7층" />
    </div>
    <div class="form-group">
      <label style="font-weight:700; font-size:0.85rem;">🗂️ 카테고리</label>
      <select class="form-input" id="category">
        <option value="카페">☕ 카페</option>
        <option value="쇼핑몰">🛍️ 쇼핑몰</option>
        <option value="지하철">🚇 지하철역</option>
        <option value="공원">🌿 공원</option>
        <option value="기타">📦 기타</option>
      </select>
    </div>
    <div class="form-group">
      <label style="font-weight:700; font-size:0.85rem;">⭐ 평점</label>
      <div class="star-select">
        <button class="star-btn" onclick="setStar(1)">⭐</button><button class="star-btn" onclick="setStar(2)">⭐</button><button class="star-btn" onclick="setStar(3)">⭐</button><button class="star-btn" onclick="setStar(4)">⭐</button><button class="star-btn" onclick="setStar(5)">⭐</button>
      </div>
    </div>
    <div class="form-group">
      <label style="font-weight:700; font-size:0.85rem;">📝 리뷰 내용</label>
      <textarea class="form-input" id="review-text" style="height:100px;" placeholder="상태를 공유해주세요!"></textarea>
    </div>
    <div class="form-group">
        <label style="font-weight:700; font-size:0.85rem;">👤 닉네임</label>
        <input class="form-input" id="nickname" placeholder="익명" />
      </div>
    <button class="form-submit" id="submit-btn" onclick="submitReview()">리뷰 등록하기</button>
  </div>
</div>

<div class="toast" id="toast">✅ 등록되었습니다!</div>

<script>
// 1. SUPABASE 설정
const SUPABASE_URL = 'https://giwpsjqxhgyytcfpsyod.supabase.co';
const SUPABASE_KEY = 'sb_publishable_d89JxB6wFVPGPNfOet_kbA_HMcnSJ76';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const COLORS = ['#1a7fc4','#00c9b1','#e67e22','#8e44ad','#27ae60'];
let allReviews = [];
let selectedStar = 0;
let activeCategory = '전체';
let activeTag = '';

// 2. 초기화
async function init() {
    await fetchReviews();
    renderTopPlaces();
}

async function fetchReviews() {
    const { data, error } = await supabaseClient.from('reviews').select('*').order('created_at', { ascending: false });
    if (error) return console.error(error);
    allReviews = data;
    applyFilters();
    updateStats();
}

// 3. 렌더링
function renderReviews(list) {
    const container = document.getElementById('reviews-container');
    document.getElementById('review-count').textContent = list.length;
    if (list.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:#999; padding:2rem;">리뷰가 없습니다.</p>';
        return;
    }
    container.innerHTML = list.map((r, i) => `
        <div class="review-card" style="animation-delay:${i*0.05}s">
            <div style="display:flex; justify-content:space-between;">
                <span class="review-place">🚽 ${r.place}</span>
                <span class="stars">${'⭐'.repeat(r.stars)}</span>
            </div>
            <p style="font-size:0.9rem; margin:10px 0; line-height:1.6;">${r.review_text}</p>
            <div style="font-size:0.75rem; color:#999;">${r.author || '익명'} | ${new Date(r.created_at).toLocaleDateString()}</div>
        </div>
    `).join('');
}

function renderTopPlaces() {
    const tops = [
        { name: '310관 7층 한강뷰', sub: '서울 동작구', score: '5.0' },
        { name: '약대 1층 신축', sub: '서울 동작구', score: '4.8' }
    ];
    document.getElementById('top-places').innerHTML = tops.map((p, i) => `
        <div class="top-place">
            <span style="font-weight:900; color:var(--primary);">${i+1}</span>
            <div style="flex:1;"><div style="font-size:0.85rem; font-weight:700;">${p.name}</div><div style="font-size:0.7rem; color:#999;">${p.sub}</div></div>
            <span style="font-weight:900; color:var(--accent2); font-size:0.85rem;">⭐${p.score}</span>
        </div>
    `).join('');
}

// 4. 기능
function applyFilters() {
    let list = [...allReviews];
    if (activeCategory !== '전체') list = list.filter(r => r.category === activeCategory);
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    if (q) list = list.filter(r => r.place.toLowerCase().includes(q));
    renderReviews(list);
}

function filterCategory(cat, el) {
    activeCategory = cat;
    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    applyFilters();
}

async function submitReview() {
    const place = document.getElementById('place-name').value.trim();
    const text = document.getElementById('review-text').value.trim();
    const cat = document.getElementById('category').value;
    const nick = document.getElementById('nickname').value.trim() || '익명';

    if (!place || !selectedStar || !text) return alert('모든 항목을 입력해주세요!');

    const { error } = await supabaseClient.from('reviews').insert([{
        place, category: cat, stars: selectedStar, review_text: text, author: nick, color: COLORS[Math.floor(Math.random()*COLORS.length)]
    }]);

    if (!error) {
        showToast('✅ 등록 완료!');
        closeModal(); resetForm(); await fetchReviews();
    }
}

function openModal() { document.getElementById('modal-overlay').classList.add('active'); document.body.style.overflow='hidden'; }
function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); document.body.style.overflow=''; }
function setStar(n) { selectedStar = n; document.querySelectorAll('.star-btn').forEach((b, i) => b.classList.toggle('active', i < n)); }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }
function updateStats() { document.getElementById('stat-reviews').textContent = allReviews.length; document.getElementById('stat-places').textContent = new Set(allReviews.map(r=>r.place)).size; }
function resetForm() { document.getElementById('place-name').value=''; document.getElementById('review-text').value=''; selectedStar=0; document.querySelectorAll('.star-btn').forEach(b=>b.classList.remove('active')); }
function doSearch() { applyFilters(); }

init();
</script>
</body>
</html>
